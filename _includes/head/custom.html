{% include base_path %}

<!-- start custom head snippets -->

<link rel="preload" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css"></noscript>

<!-- Support for Font Awesome -->
 <link rel="preload" href="{{ base_path }}/assets/css/fontawesome.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ base_path }}/assets/css/fontawesome.css"></noscript>

<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="var(--global-bg-color)"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">

<style>
  :root {
    --anthropic-sans: "Inter Tight", "Aptos", "Segoe UI", ui-sans-serif, sans-serif;
    --anthropic-serif: "Source Serif 4", Georgia, "Times New Roman", serif;
  }

  html,
  body {
    font-family: var(--anthropic-serif);
    font-weight: 400;
  }

  .page__content p,
  .page__content li {
    text-wrap: pretty;
    word-break: normal;
    overflow-wrap: normal;
  }

  .page__content h1,
  .page__content h2,
  .page__content h3 {
    font-family: var(--anthropic-sans);
    font-weight: 700;
    text-wrap: balance;
  }

  .nowrap {
    white-space: nowrap;
  }

  .masthead,
  .sidebar,
  .author__name,
  .author__bio,
  .author__urls,
  .page__footer,
  .page__meta,
  .archive__item-title,
  .btn {
    font-family: var(--anthropic-sans);
  }

  .homepage-welcome {
    margin: 0 0 1.25rem;
    padding: 1rem 1.15rem 1.05rem;
    border: 1px solid rgba(71, 106, 116, 0.16);
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(239, 246, 246, 0.92), rgba(255, 255, 255, 0.9));
    box-shadow: 0 8px 20px rgba(38, 58, 64, 0.045);
  }

  .page__content .homepage-welcome p {
    margin-bottom: 0.55rem;
  }

  .welcome-kicker {
    font-family: var(--anthropic-sans);
    color: #2f6770;
    font-size: 0.82rem !important;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .welcome-lead {
    color: var(--global-text-color);
    font-size: 1.03rem !important;
    line-height: 1.5;
  }

  .name-chinese,
  .name-pronunciation {
    display: inline-block;
    margin-left: 0.45rem;
    color: #52717a;
    font-weight: 500;
    vertical-align: 0.08em;
    white-space: nowrap;
  }

  .name-chinese {
    color: var(--global-text-color);
    font-family: KaiTi, STKaiti, "Kaiti SC", "楷体", "Microsoft YaHei", serif;
    font-size: 1em;
    letter-spacing: 0;
  }

  .name-pronunciation {
    font-size: 0.48em;
  }

  .interest-visual {
    display: block;
    width: 100%;
    margin: 0.75rem 0 0;
    border-radius: 8px;
    border: 1px solid rgba(44, 68, 76, 0.12);
    box-shadow: 0 10px 26px rgba(35, 54, 62, 0.06);
  }

  .closing-visual {
    margin-top: 2rem;
    padding-top: 1.1rem;
    border-top: 1px solid rgba(44, 68, 76, 0.12);
  }

  .page__content .closing-visual__label {
    margin-bottom: 0.25rem;
    color: #2f6770;
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .page__content .project-name {
    font-family: var(--anthropic-sans);
    color: #1f4f59;
    font-weight: 700;
  }

  .home-right-nav {
    position: fixed;
    top: 7.4rem;
    right: max(1.1rem, calc((100vw - 1280px) / 2 + 1.25rem));
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    width: 7.2rem;
    padding: 0.5rem;
    border: 1px solid rgba(44, 68, 76, 0.13);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.78);
    box-shadow: 0 10px 24px rgba(35, 54, 62, 0.045);
    backdrop-filter: blur(10px);
  }

  .home-right-nav a {
    display: block;
    padding: 0.28rem 0.42rem;
    border-radius: 6px;
    color: #355762;
    font-family: var(--anthropic-sans);
    font-size: 0.76rem;
    font-weight: 700;
    line-height: 1.1;
    text-decoration: none;
  }

  .home-right-nav a:hover,
  .home-right-nav a:focus {
    background: rgba(47, 103, 112, 0.08);
    color: #1f4f59;
  }

  .page__content .imagination-note {
    margin: 0.4rem 0 0.95rem 1.35rem;
    color: var(--global-text-color);
    font-size: 0.98rem;
    line-height: 1.5;
  }

  .home-news-column {
    margin: 1rem 0 1.05rem;
  }

  .page__content .home-news-column h2 {
    margin-top: 0.75rem;
    padding-bottom: 0.35rem;
    font-size: 1.45rem;
  }

  .page__content .home-news-column ul {
    margin-top: 0.65rem;
  }

  .page__content .home-news-column li {
    margin-bottom: 0.55rem;
    line-height: 1.48;
  }

  .project-directions {
    margin: 0.55rem 0 1.1rem;
  }

  .page__content .project-directions h3 {
    margin-top: 0.9rem;
    margin-bottom: 0.4rem;
    font-size: 1rem;
  }

  .page__content .project-directions ul {
    margin-top: 0.2rem;
    margin-bottom: 0.65rem;
  }

  .page__content .project-directions li {
    margin-bottom: 0.28rem;
    line-height: 1.48;
  }

  .project-paper-card {
    display: grid;
    grid-template-columns: 8.6rem minmax(0, 1fr);
    gap: 1.15rem;
    align-items: start;
    margin: 1rem 0 1.45rem;
    padding: 1rem;
    border: 1px solid rgba(44, 68, 76, 0.14);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.78);
    box-shadow: 0 8px 20px rgba(35, 54, 62, 0.035);
  }

  .project-paper-card__thumb {
    display: block;
    overflow: hidden;
    border: 1px solid rgba(44, 68, 76, 0.14);
    border-radius: 5px;
    background: #fff;
    box-shadow: 0 6px 14px rgba(35, 54, 62, 0.08);
  }

  .project-paper-card__thumb img {
    display: block;
    width: 100%;
    height: auto;
  }

  .page__content .project-paper-card__title {
    margin: 0 0 0.3rem;
    font-size: 1.18rem;
    line-height: 1.25;
  }

  .project-paper-card__title a {
    color: var(--global-text-color);
    text-decoration: none;
  }

  .page__content .project-paper-card__authors,
  .page__content .project-paper-card__venue,
  .page__content .project-paper-card__excerpt {
    margin: 0 0 0.35rem;
    font-size: 0.9rem;
    line-height: 1.45;
  }

  .project-paper-card__venue {
    color: #294a54;
  }

  .project-paper-card__actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 0.68rem;
  }

  .project-paper-card__actions a {
    font-family: var(--anthropic-sans);
    display: inline-flex;
    align-items: center;
    min-height: 2rem;
    padding: 0.28rem 0.72rem;
    border: 1px solid rgba(47, 103, 112, 0.35);
    border-radius: 4px;
    color: #1f4f59;
    font-size: 0.78rem;
    font-weight: 700;
    line-height: 1;
    text-decoration: none;
    text-transform: uppercase;
  }

  .project-paper-card__actions a:hover {
    background: rgba(47, 103, 112, 0.08);
  }

  .home-info-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
    gap: 1rem;
    margin: 1.8rem 0 1.5rem;
  }

  .home-info-card {
    padding: 0.92rem 1rem;
    border: 1px solid rgba(44, 68, 76, 0.12);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.72);
    box-shadow: 0 8px 18px rgba(35, 54, 62, 0.035);
  }

  .page__content .home-info-card h2 {
    margin-top: 0;
    padding-bottom: 0.35rem;
    font-size: 1.2rem;
  }

  .page__content .home-info-card p,
  .page__content .home-info-card li {
    font-size: 0.92rem;
    line-height: 1.55;
  }

  .page__content .home-info-card ul {
    margin-bottom: 0;
  }

  .page__content strong {
    color: #243f49;
    font-weight: 700;
  }

  @media screen and (max-width: 1320px) {
    .home-right-nav {
      display: none;
    }
  }

  @media screen and (max-width: 900px) {
    .home-info-grid {
      grid-template-columns: 1fr;
    }

    .project-paper-card {
      grid-template-columns: 1fr;
    }

    .project-paper-card__thumb {
      max-width: 11rem;
    }
  }

  #theme-toggle {
    display: none;
  }

  .page__footer-follow i {
    display: none;
  }

  .author__urls i {
    display: inline-block;
    color: #2f6770;
    opacity: 0.88;
    margin-right: 0.34rem;
  }

  .author__urls .xhs-icon,
  .page__footer-follow .xhs-icon {
    display: inline-block;
    width: 0.9rem !important;
    height: 0.9rem !important;
    max-width: 0.9rem !important;
    margin-right: 0.34rem;
    border-radius: 4px;
    object-fit: contain;
    vertical-align: -0.12rem;
  }

  .page__footer-follow .xhs-icon {
    margin-right: 0.18rem;
  }

  .page__footer-follow a {
    text-decoration: none;
  }

  .page__footer {
    position: relative;
    bottom: auto;
  }
</style>

<!-- end custom head snippets -->
